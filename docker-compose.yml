services:
  postgres:
    image: postgres:16-alpine
    container_name: helpdesk-postgres
    environment:
      POSTGRES_DB: helpdesk_db
      POSTGRES_USER: helpdesk
      POSTGRES_PASSWORD: helpdesk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  auth-service:
    build:
      context: ./auth-service
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: helpdesk_db
      DB_USER: helpdesk
      DB_PASSWORD: helpdesk
      JWT_SECRET: helpdesk-super-secret-key-helpdesk-super-secret-key
    ports:
      - "8081:8081"

  ticket-service:
    build:
      context: ./ticket-service
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: helpdesk_db
      DB_USER: helpdesk
      DB_PASSWORD: helpdesk
      JWT_SECRET: helpdesk-super-secret-key-helpdesk-super-secret-key
    ports:
      - "8082:8082"

  review-service:
    build:
      context: ./review-service
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: helpdesk_db
      DB_USER: helpdesk
      DB_PASSWORD: helpdesk
      JWT_SECRET: helpdesk-super-secret-key-helpdesk-super-secret-key
    ports:
      - "8083:8083"

volumes:
  postgres_data:
