services:
  postgres:
    image: postgres:16-alpine
    container_name: helpdesk-postgres
    environment:
      POSTGRES_DB: helpdesk_db
      POSTGRES_USER: helpdesk
      POSTGRES_PASSWORD: helpdesk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helpdesk -d helpdesk_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./auth-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: helpdesk_db
      DB_USER: helpdesk
      DB_PASSWORD: helpdesk
      JWT_SECRET: helpdesk-local-secret-key
    ports:
      - "8081:8081"

  ticket-service:
    build:
      context: ./ticket-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: helpdesk_db
      DB_USER: helpdesk
      DB_PASSWORD: helpdesk
      JWT_SECRET: helpdesk-local-secret-key
    ports:
      - "8082:8082"

  review-service:
    build:
      context: ./review-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: helpdesk_db
      DB_USER: helpdesk
      DB_PASSWORD: helpdesk
      JWT_SECRET: helpdesk-local-secret-key
    ports:
      - "8083:8083"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - auth-service
      - ticket-service
      - review-service
    ports:
      - "3000:80"

volumes:
  postgres_data:
