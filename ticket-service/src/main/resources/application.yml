server:
  port: 8082
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:helpdesk_db}
    username: ${DB_USER:helpdesk}
    password: ${DB_PASSWORD:helpdesk}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
app:
  jwt:
    secret: ${JWT_SECRET:helpdesk-local-secret-key}
